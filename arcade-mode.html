<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8YCZ6PXJ3B"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[WRESTLEPATH: ARCADE MODE]</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --blue-jeopardy: #222;
            --yellow-jeopardy: #336699;
            --panel-bg: #111;
            --text-gold: #ff0000;
            --neon-glow: rgba(85, 153, 255, 0.5);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: monospace !important;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .board-title {
            width: 100%;
            color: #336699;
            font-size: clamp(24px, 5vw, 40px);
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Modals & Buttons */
        .close-btn {
            background: #336699; 
            color: white;
            border: none;
            padding: 10px 25px;
            font-family: monospace;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin: 5px;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: white;
            color: black;
        }

        .utils-btn {
            width: 100%;
            background-color: transparent;
            border: 2px solid var(--yellow-jeopardy);
            color: #fff;
            padding: 10px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .utils-btn:hover {
            background-color: #336699;
            text-shadow: 0 0 5px #fff;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 4px solid #336699;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 25px #336699;
        }

        .modal-content input {
            background: #000;
            border: 2px solid #ffffff;
            color: #fff;
            padding: 8px;
            font-family: monospace;
            text-align: center;
            font-size: 16px;
            margin-top: 15px;
            width: 80%;
            outline: none;
        }

        .modal-content input:focus {
            border-color: #ffffff;
        }

        /* Layout Structure */
        .game-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1600px;
        }

        @media (min-width: 1024px) {
            .game-container {
                grid-template-columns: 280px 1fr 300px;
                align-items: start;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 4px solid #ffffff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            width: 100%;
        }

        .panel-title {
            color: #ff0000;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--yellow-jeopardy);
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        /* Card Hand */
        .hand-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 1023px) {
            .hand-container {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .card-tile {
                flex: 1 1 180px;
                max-width: 220px;
            }
        }

        .card-tile {
            background-color: #1a1a1a;
            border: 3px solid #444;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .card-tile:hover {
            transform: translateX(3px);
        }

        .card-tile.selected {
            border-color: var(--card-glow-color) !important;
            box-shadow: 0 0 12px var(--card-glow-color) !important;
            transform: scale(1.02);
        }

        .card-img-placeholder {
            width: 40px;
            height: 40px;
            background-color: #252525;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            flex-shrink: 0;
            overflow: hidden;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-name {
            font-weight: bold;
            font-size: 13px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-color-indicator {
            font-size: 11px;
            margin-top: 2px;
        }

        /* Game Board */
        .grid-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .grid-board {
            display: grid;
            grid-template-rows: repeat(8, 1fr);
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            background-color: #0c0c0c;
            padding: 10px;
            border: 4px solid var(--yellow-jeopardy);
            border-radius: 8px;
            width: 100%;
            max-width: min(750px, 85vw);
            aspect-ratio: 1 / 1;
        }

        .grid-space {
            background-color: var(--blue-jeopardy);
            border: 1.5px solid #333;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .grid-space img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* START TILE PULSE */
        .start-hint::after {
            content: "START";
            position: absolute;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 8px var(--active-glow-color, #fff);
            animation: pulseText 1s ease-in-out infinite;
            z-index: 5;
            pointer-events: none; 
        }

        @keyframes pulseText {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }

        /* HOVER AND SELECTION GLOWS */
        .grid-space.valid-move {
            cursor: pointer;
            border-color: var(--active-glow-color, var(--text-gold));
            box-shadow: inset 0 0 6px var(--active-glow-fade, rgba(241, 196, 15, 0.3));
        }

        .grid-space.valid-move:hover {
            box-shadow: inset 0 0 20px var(--active-glow-color, rgba(241, 196, 15, 0.6));
            transform: scale(1.03);
        }

        .grid-space.player-here {
            border: 2px dashed #fff !important;
            box-shadow: inset 0 0 14px var(--active-glow-color, #fff),
                        inset 0 0 10px var(--active-glow-color, #fff);
            z-index: 2;
        }

        /* DYNAMIC SPACES */
        .intense-multiplier-glow {
            box-shadow: inset 0 0 15px var(--space-glow), 0 0 15px var(--space-glow) !important;
            text-shadow: 0 0 8px #fff, 0 0 12px var(--space-glow);
        }

        .glyph-display {
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            position: relative;
            z-index: 2; /* Ensures image sits above the connector lines */
        }

        /* --- NEW: COMPLETED VS FAILED STATES --- */
        
        /* Failed chains fade out and look dark */
        .grid-space.failed {
            filter: brightness(0.3) grayscale(0.8);
            border-color: #222 !important;
        }

        /* Completed chains get a thick DARK outline and stay brightly lit inside */
        .grid-space.completed {
            box-shadow: inset 0 0 20px var(--match-color, #fff) !important;
            border: 3px solid #111 !important; 
        }

        /* Pulse animation for when a connection is successful */
        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--match-color, #fff); border-color: #fff; }
            50% { box-shadow: 0 0 20px var(--match-color, #fff), 0 0 30px var(--match-color, #fff); border-color: var(--match-color, #fff); }
            100% { box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--match-color, #fff); border-color: #fff; }
        }

        .pulse-match {
            animation: neonPulse 0.5s ease-in-out 3;
        }

        /* --- NEW: CHAIN CONNECTORS AND BADGES --- */

        .combo-badge {
            position: absolute;
            top: 3px;
            right: 3px;
            background: #050505;
            color: #fff;
            border: 1px solid var(--match-color, #fff);
            font-size: 10px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 4px;
            z-index: 5;
            box-shadow: 0 0 5px #000;
            pointer-events: none;
        }

        /* UI Stats */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        @media (min-width: 1024px) {
            .stat-grid { grid-template-columns: 1fr; }
        }

        .stat-box {
            background-color: #050505;
            border: 2px solid var(--yellow-jeopardy);
            border-radius: 4px;
            padding: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-gold);
            text-shadow: 0 0 5px rgba(241, 196, 15, 0.4);
            margin-top: 5px;
        }

        .chain-display {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            min-height: 35px;
        }

        .chain-dot {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            font-color: #000;
        }

        /* Leaderboard */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            background: #151515;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            border-left: 3px solid var(--yellow-jeopardy);
        }

        .leaderboard-entry.top-spot {
            border-left-color: #008000;
            background: #221c02;
        }

    </style>
</head>
<body>

    <div class="board-title">[WRESTLEPATH: ARCADE MODE]</div>
    <button class="utils-btn" style="width: 200px; margin-bottom: 20px;" onclick="openRules()">VIEW RULES</button>

    <div class="game-container">
        
        <div class="panel">
            <div class="panel-title">Your Hand</div>
            <div id="handContainer" class="hand-container"></div>
        </div>

        <div class="grid-wrapper">
            <div id="gridBoard" class="grid-board"></div>
        </div>

        <div class="panel">
            <div class="stat-grid">
                <div class="stat-box">
                    <div>TOTAL SCORE</div>
                    <div id="scoreDisplay" class="stat-value">0</div>
                </div>

                <div class="stat-box">
                    <div>COMBINATION CHAINS</div>
                    <div id="connectionsDisplay" class="stat-value">0</div>
                </div>

                <div class="stat-box">
                    <div>CURRENT COMBINATION CHAIN</div>
                    <div id="chainDisplay" class="chain-display"></div>
                    <div id="chainHint" style="font-size: 11px; margin-top: 5px; color: #aaa;">Collect RGGY!</div>
                </div>
            </div>

            <div class="panel-title" style="margin-top: 15px; font-size: 16px;">Global Leaderboard</div>
            <div id="leaderboardList" class="leaderboard-list"></div>

            <div style="margin-top: 20px;">
                <button class="utils-btn" onclick="resetGame()">RESET BOARD</button>
            </div>
        </div>

    </div>

    <div id="rules-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <button class="close-btn" onclick="document.getElementById('rules-modal').style.display='none'">Close Rules</button>
            <div id="rules-text" style="margin-top: 30px; text-align: left; line-height: 1.6; font-size: 1.2rem; color: white;">
                <p style="text-align:center;">Loading rules...</p>
            </div>
        </div>
    </div>

    <div id="gameOverModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: #ff0000; margin-top: 0;">GAME OVER</h2>
            <p>You're out of available moves!</p>
            <h3 style="color: #ff0000;">FINAL SCORE: <span id="finalScoreText" style="color: #ffffff;">0</span></h3>
            <p>Add your name to the Leaderboard:</p>
            <input type="text" id="playerInitials" maxlength="10" placeholder="PLAYER_1" value="PLAYER_1">
            <button class="utils-btn" style="margin-top: 15px; border-color: #ffffff;" onclick="submitHighScore()">SUBMIT SCORE</button>
        </div>
    </div>

    <script>
        const COLORS = {
            BLUE: [
                { symbol: 'B', type: 'HIGH FLYER',   name: 'BLUE CHARACTER 1',   img: 'images/blue_brand_1.png', color: '#336699', glowFade: 'rgba(51, 102, 153, 0.6)' },
                { symbol: 'B', type: 'HIGH FLYER',   name: 'BLUE CHARACTER 2',   img: 'images/blue_brand_2.png', color: '#336699', glowFade: 'rgba(51, 102, 153, 0.6)' },
                { symbol: 'B', type: 'HIGH FLYER',    name: 'BLUE CHARACTER 3',    img: 'images/blue_brand_3.png',  color: '#ff0000', glowFade: 'rgba(51, 0, 0, 0.6)' } 
            ],
            RED: [
                { symbol: 'R', type: 'HARDCORE',    name: 'RED CHARACTER 1',    img: 'images/red_brand_1.png',  color: '#ff0000', glowFade: 'rgba(255, 0, 0, 0.6)' },
                { symbol: 'R', type: 'HARDCORE',    name: 'RED CHARACTER 2',    img: 'images/red_brand_2.png',  color: '#ff0000', glowFade: 'rgba(255, 0, 0, 0.6)' },
                { symbol: 'R', type: 'HARDCORE',    name: 'RED CHARACTER 3',    img: 'images/red_brand_3.png',  color: '#ff0000', glowFade: 'rgba(255, 0, 0, 0.6)' }
            ],
            GREEN: [
                { symbol: 'G', type: 'TECHNICIAN',  name: 'GREEN CHARACTER 1',   img: 'images/green_brand_1.png', color: '#008000', glowFade: 'rgba(0, 153, 0, 0.6)' },
                { symbol: 'G', type: 'TECHNICNIAN',  name: 'GREEN CHARACTER 2',   img: 'images/green_brand_2.png', color: '#008000', glowFade: 'rgba(0, 153, 0, 0.6)' },
                { symbol: 'G', type: 'TECHNICNIAN',  name: 'GREEN CHARACTER 3',   img: 'images/green_brand_3.png', color: '#008000', glowFade: 'rgba(0, 153, 0, 0.6)' }
            ],
            YELLOW: [
                { symbol: 'Y', type: 'BRAWLER', name: 'YELLOW CHARACTER 1', img: 'images/yellow_brand_1.png', color: '#f1c40f', glowFade: 'rgba(241, 196, 15, 0.6)' },
                { symbol: 'Y', type: 'BRAWLER', name: 'YELLOW CHARACTER 2', img: 'images/yellow_brand_2.png', color: '#f1c40f', glowFade: 'rgba(241, 196, 15, 0.6)' },
                { symbol: 'Y', type: 'BRAWLER', name: 'YELLOW CHARACTER 3', img: 'images/yellow_brand_3.png', color: '#f1c40f', glowFade: 'rgba(241, 196, 15, 0.6)' }
            ],
            WILD: [
                { symbol: 'W', type: 'MANAGER', name: 'WILD CHARACTER 1',   img: 'images/wild_brand_1.png', color: '#ffffff', glowFade: 'rgba(255, 255, 255, 0.6)' },
                { symbol: 'W', type: 'MANAGER', name: 'WILD CHARACTER 2',   img: 'images/wild_brand_2.png', color: '#ffffff', glowFade: 'rgba(255, 255, 255, 0.6)' },
                { symbol: 'W', type: 'MANAGER', name: 'WILD CHARACTER 3',   img: 'images/wild_brand_3.png', color: '#ffffff', glowFade: 'rgba(255, 255, 255, 0.6)' }
            ]
        };

        const COLOR_POOL = [ 
            'BLUE', 'BLUE', 'BLUE',
            'RED', 'RED', 'RED',
            'GREEN', 'GREEN', 'GREEN',
            'YELLOW', 'YELLOW', 'YELLOW',
            'WILD'
        ]; 

        // API Configuration
        const API_URL = "https://script.google.com/macros/s/AKfycbyygfSiaLHY_oZVMlhYv5dboBe67XWU0SuDz4l2OG5nfdlarrNgVyUWwvFVtiOMfGQS3g/exec";
        const API_KEY = "6a63f91c-f906-4236-b99e-19a73f4cf33f";

        let score = 0;
        let connectionsCount = 0;
        let currentHand = [];
        let selectedCardIndex = 0;
        let playerPos = null; 
        let boardState = [];
        let currentChain = [];
        let randomStartPos = null; 

        window.onload = function() {
            buildBoardHTML();
            fetchAndRenderLeaderboard(); 
            resetGame();
        };

        function buildBoardHTML() {
            const grid = document.getElementById('gridBoard');
            grid.innerHTML = '';
            boardState = [];

            for(let r=0; r<8; r++) {
                boardState[r] = [];
                for(let c=0; c<8; c++) {
                    boardState[r][c] = { occupied: false, type: null, variantData: null, locked: false };
                    
                    let space = document.createElement('div');
                    space.id = `space-${r}-${c}`;
                    space.className = 'grid-space';
                    space.onclick = () => handleSpaceClick(r, c);

                    grid.appendChild(space);
                }
            }
        }

        function resetGame() {
            score = 0;
            connectionsCount = 0;
            currentChain = [];
            selectedCardIndex = 0;
            playerPos = null; 
            document.getElementById('gameOverModal').style.display = 'none';

            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    boardState[r][c] = { occupied: false, type: null, variantData: null, locked: false, multiplierColor: null };
                    let el = document.getElementById(`space-${r}-${c}`);
                    
                    // Clear out badges, connectors, and glyphs
                    el.innerHTML = '';
                    
                    el.className = 'grid-space'; 
                    el.style.borderColor = '#333';
                    el.style.removeProperty('--active-glow-color');
                    el.style.removeProperty('--active-glow-fade');
                    el.style.removeProperty('--match-color');
                }
            }

            // DYNAMIC MULTIPLIER GENERATOR WITH DISTANCE CHECK
            const MAX_BONUS_SPACES = 4;
            const MIN_DISTANCE = 5; 
            const bonusColorPool = ['#336699', '#ff0000', '#008000', '#f1c40f'];
            let bonusLocations = []; 

            for(let i = 0; i < MAX_BONUS_SPACES; i++) {
                let r, c;
                let validSpot = false;
                let attempts = 0; 

                while (!validSpot && attempts < 100) {
                    r = Math.floor(Math.random() * 8);
                    c = Math.floor(Math.random() * 8);
                    validSpot = true; 

                    if (boardState[r][c].multiplierColor) validSpot = false;

                    for (let loc of bonusLocations) {
                        let distance = Math.abs(r - loc.r) + Math.abs(c - loc.c);
                        if (distance < MIN_DISTANCE) {
                            validSpot = false;
                            break; 
                        }
                    }
                    attempts++;
                }

                if (validSpot) {
                    bonusLocations.push({ r: r, c: c });
                    let targetCell = boardState[r][c];
                    let assignedColor = bonusColorPool[Math.floor(Math.random() * bonusColorPool.length)];
                    
                    targetCell.multiplierColor = assignedColor;
                    
                    let spaceEl = document.getElementById(`space-${r}-${c}`);
                    spaceEl.style.setProperty('--space-glow', assignedColor);
                    spaceEl.classList.add('intense-multiplier-glow');
                    spaceEl.style.borderColor = assignedColor;
                    spaceEl.style.borderStyle = 'double';
                    spaceEl.style.borderWidth = '4px';
                }
            }

            currentHand = [];
            for(let i=0; i<5; i++) {
                currentHand.push(getRandomCard());
            }

            randomStartPos = { 
                r: Math.floor(Math.random() * 8),
                c: Math.floor(Math.random() * 8)
            };
            updateUI();
        }

        function getRandomCard() {
            let randType = COLOR_POOL[Math.floor(Math.random() * COLOR_POOL.length)];
            let variantArray = COLORS[randType];
            return variantArray[Math.floor(Math.random() * variantArray.length)];
        }

        function drawCardAtIndex(index) {
            currentHand[index] = getRandomCard();
        }

        function appendGlyphToSpace(element, cardObj) {
            let imgNode = document.createElement('img');
            imgNode.className = 'glyph-display';
            imgNode.src = cardObj.img;
            imgNode.alt = cardObj.name;
            imgNode.style.filter = `drop-shadow(0 0 8px ${cardObj.color})`;
            
            element.appendChild(imgNode);
            element.style.borderColor = cardObj.color;
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('connectionsDisplay').innerText = connectionsCount;

            const handContainer = document.getElementById('handContainer');
            handContainer.innerHTML = '';
            currentHand.forEach((card, idx) => {
                let cardEl = document.createElement('div');
                cardEl.className = `card-tile ${idx === selectedCardIndex ? 'selected' : ''}`;
                cardEl.style.borderLeft = `5px solid ${card.color}`;
                cardEl.style.setProperty('--card-glow-color', card.color);
                cardEl.onclick = () => { selectedCardIndex = idx; updateUI(); };

                cardEl.innerHTML = `
                    <div class="card-img-placeholder" style="border-color: ${card.color}">
                        <img src="${card.img}" alt="${card.name}" style="width:100%; height:100%; object-fit:contain;">
                    </div>
                    <div class="card-info">
                        <span class="card-name">${card.name}</span>
                        <span class="card-color-indicator" style="color: ${card.color}">${card.type}</span>
                    </div>
                `;
                handContainer.appendChild(cardEl);
            });

            const chainDisplay = document.getElementById('chainDisplay');
            chainDisplay.innerHTML = '';
            currentChain.forEach(coord => {
                let cellData = boardState[coord.r][coord.c];
                let dot = document.createElement('div');
                dot.className = 'chain-dot';
                dot.style.backgroundColor = cellData.variantData.color;
                dot.style.color = cellData.type === 'WILD' ? '#000' : '#fff';
                dot.innerText = cellData.variantData.symbol;
                chainDisplay.appendChild(dot);
            });
            document.getElementById('chainHint').innerText = playerPos === null ? "CLICK ON START TO BEGIN!" : `CURRENT COMBINATION CHAIN LENGTH: ${currentChain.length}/4. NO DUPLICATES!`;

            calculateValidMoves();
        }

        function calculateValidMoves() {
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    let el = document.getElementById(`space-${r}-${c}`);
                    el.classList.remove('valid-move', 'player-here', 'start-hint'); 
                }
            }

            let chosenCard = currentHand[selectedCardIndex];

            if (playerPos === null) {
                let el = document.getElementById(`space-${randomStartPos.r}-${randomStartPos.c}`);
                el.classList.add('valid-move', 'start-hint'); 
                el.style.setProperty('--active-glow-color', chosenCard.color);
                el.style.setProperty('--active-glow-fade', chosenCard.glowFade);
                return;
            }

            document.getElementById(`space-${playerPos.r}-${playerPos.c}`).classList.add('player-here');

            let potentialMoves = [
                { r: playerPos.r - 1, c: playerPos.c },
                { r: playerPos.r + 1, c: playerPos.c },
                { r: playerPos.r,     c: playerPos.c - 1 },
                { r: playerPos.r,     c: playerPos.c + 1 }
            ];

            let legalMoveExists = false;

            potentialMoves.forEach(m => {
                if(m.r >= 0 && m.r < 8 && m.c >= 0 && m.c < 8) {
                    let targetSpace = boardState[m.r][m.c];
                    if(!targetSpace.occupied && !targetSpace.locked) {
                        let el = document.getElementById(`space-${m.r}-${m.c}`);
                        el.classList.add('valid-move');
                        el.style.setProperty('--active-glow-color', chosenCard.color);
                        el.style.setProperty('--active-glow-fade', chosenCard.glowFade);
                        legalMoveExists = true;
                    }
                }
            });

            if(!legalMoveExists) {
                triggerGameOver();
            }
        }

        function handleSpaceClick(r, c) {
            let el = document.getElementById(`space-${r}-${c}`);
            if(!el.classList.contains('valid-move')) return;

            let chosenCard = currentHand[selectedCardIndex];
            playerPos = { r: r, c: c };

            // 1. INSTANT CHAIN BREAK CHECK
            let breaksChain = false;
            if (currentChain.length > 0 && chosenCard.type !== 'WILD') {
                let duplicateMatch = currentChain.find(coord => boardState[coord.r][coord.c].type === chosenCard.type);
                if (duplicateMatch) {
                    breaksChain = true;
                }
            }

            if (breaksChain) {
                currentChain.forEach(coord => {
                    let cellEl = document.getElementById(`space-${coord.r}-${coord.c}`);
                    cellEl.classList.add('failed'); 
                    boardState[coord.r][coord.c].locked = true;
                });
                currentChain = []; 
            }

            // 2. PLACE THE NEW CARD
            boardState[r][c].occupied = true;
            boardState[r][c].type = chosenCard.type;
            boardState[r][c].variantData = chosenCard; 

            appendGlyphToSpace(el, chosenCard);
            currentChain.push({ r: r, c: c });

            drawCardAtIndex(selectedCardIndex);

            // 3. CHECK FOR SUCCESS AND DRAW CONNECTORS
            if (currentChain.length === 4) {
                connectionsCount += 1;
                let currentComboId = connectionsCount; // Save this for the timeout scope
                
                let multiplierCount = 0;
                currentChain.forEach(coord => {
                    let cellData = boardState[coord.r][coord.c];
                    if (cellData.multiplierColor && cellData.variantData.color === cellData.multiplierColor) {
                        multiplierCount++;
                    }
                });

                score += 100; 
                if (multiplierCount > 0) {
                    score += (multiplierCount * 50);
                }
                
                let successChainRef = [...currentChain];
                currentChain = []; 

                successChainRef.forEach((coord, i) => {
                    let cellEl = document.getElementById(`space-${coord.r}-${coord.c}`);
                    let cellData = boardState[coord.r][coord.c];
                    
                    if (cellData && cellData.variantData) {
                        cellEl.style.setProperty('--match-color', cellData.variantData.color);
                    }
                    
                    if (cellEl.classList.contains('player-here')) {
                        cellEl.classList.remove('player-here');
                    }
                    
                    cellEl.classList.add('pulse-match');
                    
                    setTimeout(() => {
                        // Ensure the game hasn't been reset while animating
                        if(boardState[coord.r][coord.c].occupied) {
                            cellEl.classList.remove('pulse-match');
                            cellEl.classList.add('completed'); 
                            boardState[coord.r][coord.c].locked = true;

                            // Spawn the Combo ID Badge
                            let badge = document.createElement('div');
                            badge.className = 'combo-badge';
                            badge.innerText = '' + currentComboId;
                            badge.style.setProperty('--match-color', cellData.variantData.color);
                            cellEl.appendChild(badge);
                        }
                    }, 1200); 
                });
            }

            updateUI();
        }

        function triggerGameOver() {
            document.getElementById('finalScoreText').innerText = score;
            document.getElementById('gameOverModal').style.display = 'flex';
        }

        // --- NETWORK, API & RULES FUNCTIONS ---

                async function fetchAndRenderLeaderboard() {
            try {
                // Tell the script to pull from the Arcade tab
                const response = await fetch(API_URL + "?mode=Arcade");
                const data = await response.json();
                renderLiveLeaderboard(data);
            } catch (error) {
                console.error("Could not fetch leaderboard:", error);
            }
        }

        async function submitHighScore() {
            const initials = document.getElementById('playerInitials').value.toUpperCase() || "PLAYER_1";
            const originalText = document.getElementById('finalScoreText').innerText;
            document.getElementById('finalScoreText').innerText = "SAVING..."; 
            
            try {
                await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                    // Tell the script to save to the Arcade tab
                    body: JSON.stringify({ name: initials, score: score, mode: "Arcade" })
                });

                setTimeout(() => {
                    fetchAndRenderLeaderboard();
                    document.getElementById('gameOverModal').style.display = 'none';
                    resetGame();
                }, 1000);

            } catch (error) {
                console.error("Submission failed:", error);
                document.getElementById('finalScoreText').innerText = originalText;
                alert("Could not connect to the leaderboard. Please try again.");
            }
        }

        function renderLiveLeaderboard(data) {
            const sortedData = data.sort((a, b) => b.score - a.score);
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '';

            sortedData.slice(0, 6).forEach((entry, idx) => {
                let entryEl = document.createElement('div');
                entryEl.className = `leaderboard-entry ${idx === 0 ? 'top-spot' : ''}`;
let flag = idx === 0 ? '<span style="margin-right: 6px;"><img src="https://geoffhenao.github.io/wrestlepath/images/8-bit-binterman-25.png" width="20" height="20"></span>' : '';

                entryEl.innerHTML = `
                    <span>${flag}${idx + 1}. ${entry.name}</span>
                    <span style="color: var(--text-gold); font-weight:bold;">${entry.score}</span>
                `;
                container.appendChild(entryEl);
            });
        }

        function openRules() {
            const rulesUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vThEneZk9zSyUQ3uTizZ8z8Ur7hBjqXeQaq8p0bgv__VQQlp2EeYLeJ0QAmVpDP02jcQI4IzHFAFbds/pub?gid=1360806124&single=true&output=csv";
            const rulesContainer = document.getElementById('rules-text');
            
            document.getElementById('rules-modal').style.display = 'flex';
            rulesContainer.innerHTML = "<p style='text-align:center;'>Loading rules...</p>";
            
            Papa.parse(rulesUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    let html = `<h3 style="text-align: center;">How to Play:</h3>`;
                    results.data.forEach(row => {
                        if (row.RuleText && row.RuleText.trim() !== "") {
                            html += `<p style="font-size: 15px; margin-bottom: 12px;">${row.RuleText}</p>`;
                        }
                    });
                    rulesContainer.innerHTML = html;
                },
                error: function() {
                    rulesContainer.innerHTML = "<p>Could not load rules. Check the URL.</p>";
                }
            });
        }
    </script>
