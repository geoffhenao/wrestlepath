<!DOCTYPE html>
<html lang="en">
<head>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8YCZ6PXJ3B"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[MISSION MODE]</title>
    <style>
        /* Custom intense glow overlay for multiplier spaces */
.intense-multiplier-glow {
    box-shadow: inset 0 0 15px var(--space-glow), 0 0 15px var(--space-glow) !important;
    text-shadow: 0 0 8px #fff, 0 0 12px var(--space-glow);
}
        * {
            box-sizing: border-box;
        }

        :root {
            --blue-jeopardy: #222;
            --yellow-jeopardy: #336699;
            --panel-bg: #111;
            --text-gold: #ff0000;
            --neon-glow: rgba(85, 153, 255, 0.5);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: monospace !important;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .board-title {
            width: 100%;
            color: #336699;
            font-size: clamp(24px, 5vw, 40px);
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1600px;
        }

        @media (min-width: 1024px) {
            .game-container {
                grid-template-columns: 280px 1fr 300px;
                align-items: start;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 4px solid #ffffff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            width: 100%;
        }

        .panel-title {
            color: #ff0000;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--yellow-jeopardy);
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        .hand-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (max-width: 1023px) {
            .hand-container {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .card-tile {
                flex: 1 1 180px;
                max-width: 220px;
            }
        }

        .card-tile {
            background-color: #1a1a1a;
            border: 3px solid #444;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .card-tile:hover {
            transform: translateX(3px);
        }

        .card-tile.selected {
            border-color: var(--card-glow-color) !important;
            box-shadow: 0 0 12px var(--card-glow-color) !important;
            transform: scale(1.02);
        }

        .card-img-placeholder {
            width: 40px;
            height: 40px;
            background-color: #252525;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            flex-shrink: 0;
            overflow: hidden;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-name {
            font-weight: bold;
            font-size: 13px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-color-indicator {
            font-size: 11px;
            margin-top: 2px;
        }

        .grid-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .grid-board {
            display: grid;
            grid-template-rows: repeat(8, 1fr);
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            background-color: #0c0c0c;
            padding: 10px;
            border: 4px solid var(--yellow-jeopardy);
            border-radius: 8px;
            width: 100%;
            max-width: min(750px, 85vw);
            aspect-ratio: 1 / 1;
        }

        .grid-space {
            background-color: var(--blue-jeopardy);
            border: 1.5px solid #333;
            border-radius: 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .grid-space img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .grid-space.valid-move {
            cursor: pointer;
            border-color: var(--active-glow-color, var(--text-gold));
            box-shadow: inset 0 0 6px var(--active-glow-fade, rgba(241, 196, 15, 0.3));
        }

        .grid-space.valid-move:hover {
            box-shadow: inset 0 0 20px var(--active-glow-color, rgba(241, 196, 15, 0.6));
            transform: scale(1.03);
        }

        .grid-space.player-here {
            border: 2px dashed #fff !important;
            box-shadow: inset 0 0 14px var(--active-glow-color, #fff),
                        inset 0 0 10px var(--active-glow-color, #fff);
            z-index: 2;
        }

        .glyph-display {
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
        }

        .grid-space.locked {
            filter: brightness(0.3) grayscale(0.5);
            border-color: #222 !important;
        }

        .grid-space.locked::after {
            content: "🔒";
            position: absolute;
            font-size: clamp(14px, 3vw, 22px);
            color: rgba(255,255,255,0.4);
            z-index: 3;
        }

        /* NEON PULSE FOR MATCHES */
        @keyframes neonPulse {
            0% { 
                box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--match-color, #fff); 
                border-color: #fff; 
            }
            50% { 
                box-shadow: 0 0 20px var(--match-color, #fff), 0 0 30px var(--match-color, #fff); 
                border-color: var(--match-color, #fff); 
            }
            100% { 
                box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--match-color, #fff); 
                border-color: #fff; 
            }
        }

        .pulse-match {
            animation: neonPulse 0.5s ease-in-out 3;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        @media (min-width: 1024px) {
            .stat-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-box {
            background-color: #050505;
            border: 2px solid var(--yellow-jeopardy);
            border-radius: 4px;
            padding: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-gold);
            text-shadow: 0 0 5px rgba(241, 196, 15, 0.4);
            margin-top: 5px;
        }

        .chain-display {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            min-height: 35px;
        }

        .chain-dot {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
        }

        .objective-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #151515;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 4px solid #444;
            font-size: 13px;
        }
        .objective-item.done {
            border-left-color: #008000;
            background: #091a09;
            color: #88ff88;
        }
        .objective-item.done .objective-sequence-container {
            opacity: 0.5;
        }
        .objective-sequence-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .objective-dot {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: 2px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            color: #fff;
        }

        /* PERSISTENT LEADERBOARD GRAPHICS FROM ENDLESS ARCADE */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            background: #151515;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            border-left: 3px solid var(--yellow-jeopardy);
        }

        .leaderboard-entry.top-spot {
            border-left-color: #008000;
            background: #221c02;
        }

        .utils-btn {
            width: 100%;
            background-color: transparent;
            border: 2px solid var(--yellow-jeopardy);
            color: #fff;
            padding: 10px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .utils-btn:hover {
            background-color: #336699;
            text-shadow: 0 0 5px #fff;
        }

        #statusModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 4px solid #336699;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 25px #336699;
        }

        .modal-content input {
            background: #000;
            border: 2px solid #ffffff;
            color: #fff;
            padding: 8px;
            font-family: monospace;
            text-align: center;
            font-size: 16px;
            margin-top: 15px;
            width: 80%;
            outline: none;
        }
    </style>
</head>
<body>

    <div id="boardTitle" class="board-title">[ MISSION MODE: LEVEL 1 ]</div>

    <div class="game-container">
        
        <div class="panel">
            <div class="panel-title">Your Hand</div>
            <div id="handContainer" class="hand-container"></div>
        </div>

        <div class="grid-wrapper">
            <div id="gridBoard" class="grid-board"></div>
        </div>

        <div class="panel">
            <div class="stat-grid">
                <div class="stat-box">
                    <div>TOTAL SCORE</div>
                    <div id="scoreDisplay" class="stat-value">0</div>
                </div>

                <div class="stat-box">
                    <div>CURRENT CONNECTION</div>
                    <div id="chainDisplay" class="chain-display"></div>
                    <div id="chainHint" style="font-size: 11px; margin-top: 5px; color: #aaa;">BUILD COMBINATIONS THAT MATCH THE REQUESTED SEQUENCES!</div>
                </div>
            </div>

            <div class="panel-title" style="margin-top: 15px; font-size: 16px;">Level Objectives</div>
            <div id="objectivesList"></div>

            <div class="panel-title" style="margin-top: 20px; font-size: 16px;">Global Leaderboard</div>
            <div id="leaderboardList" class="leaderboard-list"></div>

            <div style="margin-top: 20px;">
                <button class="utils-btn" onclick="resetLevel()">RESTART LEVEL</button>
            </div>
        </div>

    </div>

    <div id="statusModal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script> // Add extra lines to add new characters.
        const COLORS = {
            BLUE: [
                { type: 'BLUE',   name: 'BLUE LOGO A',   img: 'images/blue_brand_1.png', color: '#336699', glowFade: 'rgba(51, 102, 153, 0.6)' },
                { type: 'BLUE',   name: 'BLUE LOGO B',   img: 'images/blue_brand_2.png', color: '#336699', glowFade: 'rgba(51, 102, 153, 0.6)' }
            ],
            RED: [
                { type: 'RED',    name: 'RED HERO A',    img: 'images/red_brand_1.png',  color: '#ff0000', glowFade: 'rgba(255, 0, 0, 0.6)' },
                { type: 'RED',    name: 'RED HERO B',    img: 'images/red_brand_2.png',  color: '#ff0000', glowFade: 'rgba(255, 0, 0, 0.6)' }
            ],
            GREEN: [
                { type: 'GREEN',  name: 'GREEN GEM A',   img: 'images/green_brand_1.png', color: '#008000', glowFade: 'rgba(0, 153, 0, 0.6)' },
                { type: 'GREEN',  name: 'GREEN GEM B',   img: 'images/green_brand_2.png', color: '#008000', glowFade: 'rgba(0, 153, 0, 0.6)' }
            ],
            YELLOW: [
                { type: 'YELLOW', name: 'YELLOW GOLD A', img: 'images/yellow_brand_1.png', color: '#f1c40f', glowFade: 'rgba(241, 196, 15, 0.6)' },
                { type: 'YELLOW', name: 'YELLOW GOLD B', img: 'images/yellow_brand_2.png', color: '#f1c40f', glowFade: 'rgba(241, 196, 15, 0.6)' }
            ],
            SPECIAL: [
                { type: 'SPECIAL', name: 'WILD CARD A',   img: 'images/special_brand_1.png', color: '#ffffff', glowFade: 'rgba(255, 255, 255, 0.6)' },
                { type: 'SPECIAL', name: 'WILD CARD B',   img: 'images/special_brand_2.png', color: '#ffffff', glowFade: 'rgba(255, 255, 255, 0.6)' }
            ]
        };

        const COLOR_POOL = ['BLUE', 'BLUE', 'RED', 'RED', 'GREEN', 'GREEN', 'YELLOW', 'YELLOW', 'SPECIAL']; 

        const GAME_LEVELS = [
            {
                level: 1,
                name: "LEVEL 1",
                sequences: [
                    { target: ["R", "G", "Y"], completed: false },
                    { target: ["B", "R", "G"], completed: false },
                    { target: ["R", "B", "G", "Y"], completed: false }
                ]
            },
            {
                level: 2,
                name: "LEVEL 2",
                sequences: [
                    { target: ["B", "B", "Y"], completed: false },
                    { target: ["G", "R", "Y", "B"], completed: false },
                    { target: ["Y", "G", "R"], completed: false }
                ]
            }
        ];

        let currentLevelIndex = 0; 
        let score = 0;
        let currentHand = [];
        let selectedCardIndex = 0;
        let playerPos = null; 
        let boardState = [];
        let currentChain = [];
        let runningObjectives = [];

        // Seed data defaults if local storage hasn't been instantiated yet
        const DEFAULT_LEADERBOARD = [
            { name: "BINTERMAN", score: 82919 },
            { name: "GEOFF", score: 7015 },
            { name: "TYLER", score: 1250 },
            { name: "ETHAN", score: 1206 },
            { name: "ALEX", score: 1201 },
        ];
        let highScores = [];

        window.onload = function() {
            buildBoardHTML();
            renderLeaderboard();
            loadLevel(0);
        };

        function buildBoardHTML() {
            const grid = document.getElementById('gridBoard');
            grid.innerHTML = '';
            boardState = [];

            for(let r=0; r<8; r++) {
                boardState[r] = [];
                for(let c=0; c<8; c++) {
                    boardState[r][c] = { occupied: false, type: null, variantData: null, locked: false };
                    
                    let space = document.createElement('div');
                    space.id = `space-${r}-${c}`;
                    space.className = 'grid-space';
                    space.onclick = () => handleSpaceClick(r, c);

                    grid.appendChild(space);
                }
            }
        }

        function renderLeaderboard() {
            highScores = JSON.parse(localStorage.getItem('missionLeaderboard')) || DEFAULT_LEADERBOARD;
            highScores.sort((a, b) => b.score - a.score);
            
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '';

            highScores.slice(0, 5).forEach((entry, idx) => {
                let entryEl = document.createElement('div');
                entryEl.className = `leaderboard-entry ${idx === 0 ? 'top-spot' : ''}`;
                
                let flag = idx === 0 ? '<span style="margin-right: 6px;">🚩</span>' : '';

                entryEl.innerHTML = `
                    <span>${flag}${idx + 1}. ${entry.name}</span>
                    <span style="color: var(--text-gold); font-weight:bold;">${entry.score}</span>
                `;
                container.appendChild(entryEl);
            });
        }

        function loadLevel(index) {
            if (index >= GAME_LEVELS.length) {
                triggerVictoryScreen();
                return;
            }

            currentLevelIndex = index;
            let levelData = GAME_LEVELS[currentLevelIndex];
            document.getElementById('boardTitle').innerText = levelData.name;
            runningObjectives = JSON.parse(JSON.stringify(levelData.sequences));
            resetLevelData();
        }

        function resetLevel() {
            score = 0;
            let levelData = GAME_LEVELS[currentLevelIndex];
            runningObjectives = JSON.parse(JSON.stringify(levelData.sequences));
            resetLevelData();
        }

        function resetLevelData() {
    currentChain = [];
    selectedCardIndex = 0;
    playerPos = null; 
    document.getElementById('statusModal').style.display = 'none';

    // 1. Clear the board state
    for(let r=0; r<8; r++) {
        for(let c=0; c<8; c++) {
            boardState[r][c] = { occupied: false, type: null, variantData: null, locked: false, multiplierColor: null };
            let el = document.getElementById(`space-${r}-${c}`);
            el.className = 'grid-space';
            el.style.border = '1.5px solid #333';
            el.classList.remove('intense-multiplier-glow');
            el.removeAttribute('data-multiplier-hint');
            let asset = el.querySelector('.glyph-display');
            if(asset) asset.remove();
        }
    }

    /*************************************************************************
     * 🛠️ DYNAMIC MULTIPLIER GENERATOR ENGINE
     *************************************************************************/
    const MAX_BONUS_SPACES = 4; 
    let emptySpaces = [];
    
    // Scan the board for available spots
    for(let r=0; r<8; r++) {
        for(let c=0; c<8; c++) {
            if (!boardState[r][c].occupied) emptySpaces.push({r, c});
        }
    }
    
    const numToSpawn = Math.min(MAX_BONUS_SPACES, emptySpaces.length);
    const bonusColorPool = ['#336699', '#ff0000', '#008000', '#f1c40f']; 
    
    for (let i = 0; i < numToSpawn; i++) {
        let randomIndex = Math.floor(Math.random() * emptySpaces.length);
        let {r, c} = emptySpaces.splice(randomIndex, 1)[0];
        
        let assignedColor = bonusColorPool[Math.floor(Math.random() * bonusColorPool.length)];
        boardState[r][c].multiplierColor = assignedColor;
        
        let spaceEl = document.getElementById(`space-${r}-${c}`);
        spaceEl.style.setProperty('--space-glow', assignedColor);
        spaceEl.classList.add('intense-multiplier-glow');
        spaceEl.style.borderColor = assignedColor;
        spaceEl.style.borderStyle = 'double';
        spaceEl.style.borderWidth = '4px';
        spaceEl.setAttribute('data-multiplier-hint', (assignedColor === '#336699' ? 'BLUE' : 'BONUS') + ' X2');
    }
    /*************************************************************************/

    currentHand = [];
    for(let i=0; i<5; i++) {
        currentHand.push(getRandomCard());
    }

    updateUI();
}

        function getRandomCard() {
            let randType = COLOR_POOL[Math.floor(Math.random() * COLOR_POOL.length)];
            let variantArray = COLORS[randType];
            return variantArray[Math.floor(Math.random() * variantArray.length)];
        }

        function drawCardAtIndex(index) {
            currentHand[index] = getRandomCard();
        }

        function appendGlyphToSpace(element, cardObj) {
            let imgNode = document.createElement('img');
            imgNode.className = 'glyph-display';
            imgNode.src = cardObj.img;
            imgNode.alt = cardObj.name;
            imgNode.style.filter = `drop-shadow(0 0 8px ${cardObj.color})`;
            
            element.appendChild(imgNode);
            element.style.borderColor = cardObj.color;
        }

        function getStyleDataByChar(char) {
            switch(char) {
                case 'R': return COLORS.RED[0];
                case 'B': return COLORS.BLUE[0];
                case 'G': return COLORS.GREEN[0];
                case 'Y': return COLORS.YELLOW[0];
                case 'S':
                default: return COLORS.SPECIAL[0];
            }
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = score;

            const handContainer = document.getElementById('handContainer');
            handContainer.innerHTML = '';
            currentHand.forEach((card, idx) => {
                let cardEl = document.createElement('div');
                cardEl.className = `card-tile ${idx === selectedCardIndex ? 'selected' : ''}`;
                cardEl.style.borderLeft = `5px solid ${card.color}`;
                cardEl.style.setProperty('--card-glow-color', card.color);
                cardEl.onclick = () => { selectedCardIndex = idx; updateUI(); };

                cardEl.innerHTML = `
                    <div class="card-img-placeholder" style="border-color: ${card.color}">
                        <img src="${card.img}" alt="${card.name}" style="width:100%; height:100%; object-fit:contain;">
                    </div>
                    <div class="card-info">
                        <span class="card-name">${card.name}</span>
                        <span class="card-color-indicator" style="color: ${card.color}">${card.type}</span>
                    </div>
                `;
                handContainer.appendChild(cardEl);
            });

            const chainDisplay = document.getElementById('chainDisplay');
            chainDisplay.innerHTML = '';
            currentChain.forEach(coord => {
                let cellData = boardState[coord.r][coord.c];
                let dot = document.createElement('div');
                dot.className = 'chain-dot';
                dot.style.backgroundColor = cellData.variantData.color;
                dot.style.color = cellData.type === 'SPECIAL' ? '#000' : '#fff';
                dot.innerText = cellData.type[0];
                chainDisplay.appendChild(dot);
            });

            const objContainer = document.getElementById('objectivesList');
            objContainer.innerHTML = '';
            runningObjectives.forEach(obj => {
                let objEl = document.createElement('div');
                objEl.className = `objective-item ${obj.completed ? 'done' : ''}`;
                
                let sequenceHTML = `<div class="objective-sequence-container">`;
                obj.target.forEach((char, cIdx) => {
                    let visualProfile = getStyleDataByChar(char);
                    sequenceHTML += `
                        <div class="objective-dot" style="background-color: ${visualProfile.color}; color: ${char === 'S' ? '#000' : '#fff'}">
                            ${char}
                        </div>
                    `;
                    if (cIdx < obj.target.length - 1) {
                        sequenceHTML += `<span style="color: #666; font-size: 10px;"></span>`;
                    }
                });
                sequenceHTML += `</div>`;

                let checkState = obj.completed ? '✅ CLEARED' : '';
                objEl.innerHTML = `
                    ${sequenceHTML}
                    <span style="font-weight: bold;">${checkState}</span>
                `;
                objContainer.appendChild(objEl);
            });

            calculateValidMoves();
        }

        function calculateValidMoves() {
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    let el = document.getElementById(`space-${r}-${c}`);
                    el.classList.remove('valid-move', 'player-here');
                }
            }

            let chosenCard = currentHand[selectedCardIndex];

            if (playerPos === null) {
                for(let r=0; r<8; r++) {
                    for(let c=0; c<8; c++) {
                        let el = document.getElementById(`space-${r}-${c}`);
                        el.classList.add('valid-move');
                        el.style.setProperty('--active-glow-color', chosenCard.color);
                        el.style.setProperty('--active-glow-fade', chosenCard.glowFade);
                    }
                }
                return;
            }

            document.getElementById(`space-${playerPos.r}-${playerPos.c}`).classList.add('player-here');

            let potentialMoves = [
                { r: playerPos.r - 1, c: playerPos.c },
                { r: playerPos.r + 1, c: playerPos.c },
                { r: playerPos.r,     c: playerPos.c - 1 },
                { r: playerPos.r,     c: playerPos.c + 1 }
            ];

            let legalMoveExists = false;

            potentialMoves.forEach(m => {
                if(m.r >= 0 && m.r < 8 && m.c >= 0 && m.c < 8) {
                    let targetSpace = boardState[m.r][m.c];
                    if(!targetSpace.occupied && !targetSpace.locked) {
                        let el = document.getElementById(`space-${m.r}-${m.c}`);
                        el.classList.add('valid-move');
                        el.style.setProperty('--active-glow-color', chosenCard.color);
                        el.style.setProperty('--active-glow-fade', chosenCard.glowFade);
                        legalMoveExists = true;
                    }
                }
            });

            if(!legalMoveExists) {
                triggerGameOver();
            }
        }

        function handleSpaceClick(r, c) {
            let el = document.getElementById(`space-${r}-${c}`);
            if(!el.classList.contains('valid-move')) return;

            let chosenCard = currentHand[selectedCardIndex];

            playerPos = { r: r, c: c };
            boardState[r][c].occupied = true;
            boardState[r][c].type = chosenCard.type;
            boardState[r][c].variantData = chosenCard;

            appendGlyphToSpace(el, chosenCard);
            currentChain.push({ r: r, c: c });

            drawCardAtIndex(selectedCardIndex);
            evaluateSequences();
            updateUI();
        }

        function evaluateSequences() {
            let builtStringArray = currentChain.map(coord => {
                let type = boardState[coord.r][coord.c].type;
                if (type === 'SPECIAL') return 'S'; 
                return type[0]; 
            });

            let matchedAny = false;

            runningObjectives.forEach(obj => {
                if (obj.completed) return;

                let targetLen = obj.target.length;
                let builtLen = builtStringArray.length;

                for (let startIdx = 0; startIdx <= builtLen - targetLen; startIdx++) {
                    let matchValid = true;

                    for (let i = 0; i < targetLen; i++) {
                        let builtChar = builtStringArray[startIdx + i];
                        let targetChar = obj.target[i];

                        if (builtChar !== targetChar && builtChar !== 'S') {
                            matchValid = false;
                            break;
                        }
                    }

                    if (matchValid) {
                        obj.completed = true;
                        
                        let basePoints = (obj.target.length * 50);  // This dictates how many points per space per combo.
                        let multiplierTriggered = false;
                        
                        let clearChainRef = currentChain.slice(startIdx, startIdx + targetLen);
                        currentChain = []; 

                        // 🔍 Evaluate match segments against assigned multiplier conditions
                        clearChainRef.forEach(coord => {
                            let cellEl = document.getElementById(`space-${coord.r}-${coord.c}`);
                            let cellData = boardState[coord.r][coord.c];
                            
                            // Check if cell is an assigned multiplier node and the tile matched matches the required color
                            if (cellData.multiplierColor && cellData.variantData && cellData.variantData.color === cellData.multiplierColor) {
                                multiplierTriggered = true;
                            }

                            if (cellData && cellData.variantData) {
                                cellEl.style.setProperty('--match-color', cellData.variantData.color);
                            }
                            
                            if (cellEl.classList.contains('player-here')) {
                                cellEl.classList.remove('player-here');
                            }
                            
                            cellEl.classList.add('pulse-match');
                            
                            setTimeout(() => {
                                cellEl.classList.remove('pulse-match');
                                cellEl.classList.add('locked');
                                boardState[coord.r][coord.c].locked = true;
                                updateUI();
                            }, 1200);
                        });

                        if (multiplierTriggered) {
                            basePoints *= 2; // Double points awarded!
                        }
                        
                        score += basePoints;
                        matchedAny = true;
                        break; 
                    }
                }
            });

            let maxTargetLen = Math.max(...runningObjectives.map(o => o.target.length));
            if (!matchedAny && currentChain.length > maxTargetLen) {
                currentChain.shift(); 
            }

            let levelComplete = runningObjectives.every(o => o.completed);
            if (levelComplete) {
                setTimeout(() => {
                    triggerLevelClearedScreen();
                }, 1300);
            }
        }

        function triggerLevelClearedScreen() {
            const modal = document.getElementById('statusModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <h2 style="color: #00ff00; margin-top: 0;">LEVEL CLEARED!</h2>
                <p>All requested matches have been booked!</p>
                <h3 style="color: var(--text-gold);">CURRENT SCORE: ${score}</h3>
                <button class="utils-btn" style="margin-top: 15px; border-color: #ffffff;" onclick="advanceLevel()">PROCEED TO NEXT LEVEL</button>
            `;
            modal.style.display = 'flex';
        }

        function advanceLevel() {
            currentLevelIndex++;
            loadLevel(currentLevelIndex);
        }

        function triggerVictoryScreen() {
            const modal = document.getElementById('statusModal');
            const content = document.getElementById('modalContent');
            
            let inputHTML = '';
            const lowestScore = highScores.length >= 5 ? highScores[highScores.length - 1].score : 0;
            
            if (score > lowestScore || highScores.length < 5) {
                inputHTML = `
                    <p>NEW HIGH SCORE! Enter your name:</p>
                    <input type="text" id="playerInitials"  value="D. Faultname">
                    <button class="utils-btn" style="margin-top: 15px; border-color: #ffffff;" onclick="submitHighScore()">SUBMIT SCORE</button>
                `;
            } else {
                inputHTML = `<button class="utils-btn" style="margin-top: 15px; border-color: #ffffff;" onclick="currentLevelIndex=0; score=0; loadLevel(0);">PLAY AGAIN</button>`;
            }

            content.innerHTML = `
                <h2 style="color: #f1c40f; margin-top: 0;">🏆 ALL MATCHES BOOKED! 🏆</h2>
                <p>You did a great job booking those shows, brother!</p>
                <h2 style="color: #fff;">FINAL SCORE: ${score}</h2>
                ${inputHTML}
            `;
            modal.style.display = 'flex';
        }

        function triggerGameOver() {
            const modal = document.getElementById('statusModal');
            const content = document.getElementById('modalContent');
            
            let inputHTML = '';
            const lowestScore = highScores.length >= 5 ? highScores[highScores.length - 1].score : 0;
            
            if (score > lowestScore || highScores.length < 5) {
                inputHTML = `
                    <p>YOU MADE THE LEADERBOARD! Enter your name here:</p>
                    <input type="text" id="playerInitials"  value="D. Faultname">
                    <button class="utils-btn" style="margin-top: 15px; border-color: #ffffff;" onclick="submitHighScore()">SUBMIT SCORE</button>
                `;
            } else {
                inputHTML = `<button class="utils-btn" style="margin-top: 15px; border-color: #ffffff;" onclick="resetLevel()">RETRY MISSION</button>`;
            }

            content.innerHTML = `
                <h2 style="color: #ff0000; margin-top: 0;">MISSION FAILURE</h2>
                <p>No more available moves!</p>
                <h3 style="color: #ffffff;">SCORE: ${score}</h3>
                ${inputHTML}
            `;
            modal.style.display = 'flex';
        }

        function submitHighScore() {
            let initials = document.getElementById('playerInitials').value.toUpperCase() || "AAA";
            highScores.push({ name: initials, score: score });
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 5);
            
            localStorage.setItem('missionLeaderboard', JSON.stringify(highScores));
            
            renderLeaderboard();
            
            currentLevelIndex = 0;
            score = 0;
            loadLevel(0);
        }
    </script>
</body>
</html>
